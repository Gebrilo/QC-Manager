name: Build and Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      refresh_staging_data:
        description: 'Refresh staging database from production'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  API_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/qc-api
  WEB_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/qc-web

jobs:
  build-api:
    name: Build API Image (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          file: ./apps/api/Dockerfile
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api-${{ steps.tag.outputs.tag }}
          cache-to: type=gha,mode=max,scope=api-${{ steps.tag.outputs.tag }}

  build-web:
    name: Build Web Image (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Resolve build args
        id: args
        run: |
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "api_url=https://${{ secrets.STAGING_API_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "public_site_url=https://${{ secrets.STAGING_WEB_DOMAIN }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "api_url=https://${{ secrets.API_DOMAIN }}" >> $GITHUB_OUTPUT
            echo "public_site_url=https://${{ secrets.WEB_DOMAIN }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          file: ./apps/web/Dockerfile
          context: .
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.args.outputs.tag }}
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=web-${{ steps.args.outputs.tag }}
          cache-to: type=gha,mode=max,scope=web-${{ steps.args.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.args.outputs.api_url }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            PUBLIC_SITE_URL=${{ steps.args.outputs.public_site_url }}
            LANDING_PAGE_REVALIDATE_SECONDS=60

  # ===========================================================================
  # PRODUCTION DEPLOY — manual only, always from main
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          QC_AGENT_WEBHOOK_SECRET: ${{ secrets.QC_AGENT_WEBHOOK_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          WEB_DOMAIN: ${{ secrets.WEB_DOMAIN }}
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TULEAP_BASE_URL: ${{ secrets.TULEAP_BASE_URL }}
          TULEAP_ACCESS_KEY: ${{ secrets.TULEAP_ACCESS_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          timeout: 60s
          command_timeout: 30m
          envs: DOCKER_HUB_USERNAME,DOCKER_HUB_TOKEN,JWT_SECRET,QC_AGENT_WEBHOOK_SECRET,POSTGRES_PASSWORD,SUPABASE_DATABASE_URL,SUPABASE_JWT_SECRET,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,N8N_WEBHOOK_URL,WEB_DOMAIN,API_DOMAIN,CORS_ORIGIN,TULEAP_BASE_URL,TULEAP_ACCESS_KEY
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/qc-manager"
            REPO_URL="https://github.com/Gebrilo/QC-Manager.git"

            echo "=== Checking deployment directory ==="
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Cloning repository..."
              sudo mkdir -p "$DEPLOY_DIR"
              sudo chown $USER:$USER "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            echo "=== Pulling latest code (main) ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Ensuring shared network exists ==="
            docker network create qc-shared-network 2>/dev/null || true

            echo "=== Ensuring uploads directories exist with correct ownership ==="
            mkdir -p "$DEPLOY_DIR/uploads/avatars" "$DEPLOY_DIR/uploads/journey-tasks"
            sudo chown -R 1001:1001 "$DEPLOY_DIR/uploads"

            echo "=== Writing .env ==="
            {
              echo "DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}"
              echo "WEB_DOMAIN=${WEB_DOMAIN}"
              echo "API_DOMAIN=${API_DOMAIN}"
              printf '%s\n' "SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL}"
              echo "DATABASE_SSL=false"
              printf '%s\n' "SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}"
              echo "POSTGRES_USER=qc_admin"
              printf '%s\n' "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
              echo "POSTGRES_DB=qc_app"
              printf '%s\n' "JWT_SECRET=${JWT_SECRET}"
              printf '%s\n' "QC_AGENT_WEBHOOK_SECRET=${QC_AGENT_WEBHOOK_SECRET}"
              echo "CORS_ORIGIN=${CORS_ORIGIN}"
              echo "PUBLIC_SITE_URL=https://${WEB_DOMAIN}"
              echo "LANDING_PAGE_REVALIDATE_SECONDS=60"
              printf '%s\n' "N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}"
              printf '%s\n' "SUPABASE_URL=${SUPABASE_URL}"
              printf '%s\n' "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
              printf '%s\n' "TULEAP_BASE_URL=${TULEAP_BASE_URL}"
              printf '%s\n' "TULEAP_ACCESS_KEY=${TULEAP_ACCESS_KEY}"
              echo "NEXT_PUBLIC_API_URL=https://${API_DOMAIN}"
              echo "RBAC_UNIFIED=on"
            } > .env

            echo "=== Docker login ==="
            echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin

            echo "=== Pulling app images (:latest) ==="
            docker compose -f docker-compose.prod.yml pull

            echo "=== Removing stale containers ==="
            docker rm -f qc-api qc-web || true

            echo "=== Deploying ==="
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "=== Cleanup ==="
            docker image prune -f

            echo "=== Production deployment complete ==="
            docker compose -f docker-compose.prod.yml ps

  # ===========================================================================
  # STAGING DEPLOY — manual only, from the branch that triggered the workflow
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.event.inputs.environment == 'staging'

    steps:
      - name: Deploy Staging to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          QC_AGENT_WEBHOOK_SECRET: ${{ secrets.STAGING_QC_AGENT_WEBHOOK_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          WEB_DOMAIN: ${{ secrets.STAGING_WEB_DOMAIN }}
          API_DOMAIN: ${{ secrets.STAGING_API_DOMAIN }}
          CORS_ORIGIN: ${{ secrets.STAGING_CORS_ORIGIN }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REFRESH_STAGING_DATA: ${{ github.event.inputs.refresh_staging_data || 'false' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          timeout: 60s
          command_timeout: 90m
          envs: DOCKER_HUB_USERNAME,DOCKER_HUB_TOKEN,JWT_SECRET,QC_AGENT_WEBHOOK_SECRET,POSTGRES_PASSWORD,N8N_WEBHOOK_URL,WEB_DOMAIN,API_DOMAIN,CORS_ORIGIN,SUPABASE_DATABASE_URL,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY,SUPABASE_JWT_SECRET,DEPLOY_BRANCH,REFRESH_STAGING_DATA
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="/opt/qc-manager-staging"
            REPO_URL="https://github.com/Gebrilo/QC-Manager.git"

            echo "=== Checking deployment directory ==="
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "Cloning repository..."
              sudo mkdir -p "$DEPLOY_DIR"
              sudo chown $USER:$USER "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            echo "=== Pulling branch: ${DEPLOY_BRANCH} ==="
            git fetch origin "${DEPLOY_BRANCH}"
            git reset --hard "origin/${DEPLOY_BRANCH}"

            echo "=== Ensuring shared network exists ==="
            docker network create qc-shared-network 2>/dev/null || true

            echo "=== Ensuring uploads directories exist with correct ownership ==="
            mkdir -p "$DEPLOY_DIR/uploads/avatars" "$DEPLOY_DIR/uploads/journey-tasks"
            sudo chown -R 1001:1001 "$DEPLOY_DIR/uploads"

            echo "=== Ensuring backup directory exists ==="
            mkdir -p "$DEPLOY_DIR/backups-staging"

            echo "=== Writing .env.staging ==="
            {
              echo "DOCKER_HUB_USERNAME=${DOCKER_HUB_USERNAME}"
              echo "WEB_DOMAIN=${WEB_DOMAIN}"
              echo "API_DOMAIN=${API_DOMAIN}"
              echo "POSTGRES_USER=qc_staging_admin"
              printf '%s\n' "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
              echo "POSTGRES_DB=qc_staging_app"
              echo "DATABASE_SSL=false"
              printf '%s\n' "JWT_SECRET=${JWT_SECRET}"
              printf '%s\n' "QC_AGENT_WEBHOOK_SECRET=${QC_AGENT_WEBHOOK_SECRET}"
              echo "CORS_ORIGIN=${CORS_ORIGIN}"
              echo "PUBLIC_SITE_URL=https://${WEB_DOMAIN}"
              echo "LANDING_PAGE_REVALIDATE_SECONDS=60"
              printf '%s\n' "N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}"
              echo "BACKUP_PATH=./backups-staging"
              echo "BACKUP_RETENTION_DAYS=3"
              printf '%s\n' "SUPABASE_URL=${SUPABASE_URL}"
              printf '%s\n' "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
              printf '%s\n' "SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}"
            } > .env.staging

            echo "=== Docker login ==="
            echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin

            echo "=== Pulling app images (:staging) ==="
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging pull

            echo "=== Deploying staging ==="
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging up -d --force-recreate

            echo "=== Syncing staging database password ==="
            escaped_postgres_password=$(printf '%s' "$POSTGRES_PASSWORD" | sed "s/'/''/g")
            set +e
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging exec -T postgres \
              psql -U qc_staging_admin -d postgres -v ON_ERROR_STOP=1 \
              -c "ALTER USER qc_staging_admin WITH PASSWORD '${escaped_postgres_password}';"
            password_sync_status=$?
            set -e
            if [ "$password_sync_status" -ne 0 ]; then
              echo "Password sync returned ${password_sync_status}; verifying current password before continuing."
            fi
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging exec -T postgres \
              sh -c 'PGPASSWORD="$POSTGRES_PASSWORD" psql -h localhost -U qc_staging_admin -d postgres -v ON_ERROR_STOP=1 -c "SELECT 1" >/dev/null'

            echo "=== Ensuring staging database extensions ==="
            set +e
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging exec -T postgres \
              psql -U qc_staging_admin -d qc_staging_app -v ON_ERROR_STOP=1 \
              -c 'CREATE SCHEMA IF NOT EXISTS extensions;' \
              -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp" WITH SCHEMA extensions;' \
              -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA extensions;' \
              -c 'ALTER DATABASE qc_staging_app SET search_path TO public, extensions;' \
              -c 'ALTER ROLE qc_staging_admin IN DATABASE qc_staging_app SET search_path TO public, extensions;'
            extension_setup_status=$?
            set -e
            if [ "$extension_setup_status" -ne 0 ]; then
              echo "Extension setup returned ${extension_setup_status}; verifying required functions before continuing."
            fi
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging exec -T postgres \
              psql -U qc_staging_admin -d qc_staging_app -v ON_ERROR_STOP=1 \
              -c 'SET search_path TO public, extensions; SELECT uuid_generate_v4();' >/dev/null

            if [ "${REFRESH_STAGING_DATA}" = "true" ]; then
              echo "=== Refreshing staging data from production public schema ==="
              DUMP_FILE="$DEPLOY_DIR/backups-staging/prod-public-$(date +%Y%m%d%H%M%S).dump"
              docker run --rm --network qc-shared-network postgres:15-alpine pg_dump \
                --format=custom \
                --schema=public \
                --no-owner \
                --no-acl \
                "$SUPABASE_DATABASE_URL" > "$DUMP_FILE"

              docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging stop api web backup
              docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging exec -T postgres \
                psql -U qc_staging_admin -d qc_staging_app -v ON_ERROR_STOP=1 \
                -c 'DROP SCHEMA IF EXISTS public CASCADE;' \
                -c 'DROP SCHEMA IF EXISTS extensions CASCADE;' \
                -c 'CREATE SCHEMA extensions;' \
                -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp" WITH SCHEMA extensions;' \
                -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA extensions;' \
                -c 'ALTER DATABASE qc_staging_app SET search_path TO public, extensions;' \
                -c 'ALTER ROLE qc_staging_admin IN DATABASE qc_staging_app SET search_path TO public, extensions;'
              docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging exec -T postgres \
                pg_restore --no-owner --no-acl -U qc_staging_admin -d qc_staging_app < "$DUMP_FILE"
              docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging up -d --force-recreate api web backup
            else
              docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging up -d --force-recreate api backup
            fi

            echo "=== Cleanup ==="
            docker image prune -f

            echo "=== Staging deployment complete ==="
            docker compose -p qc-staging -f docker-compose.staging.yml --env-file .env.staging ps
